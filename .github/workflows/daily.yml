name: 🌙 DealDar Bot – Täglich
permissions:
  contents: write
on:
  schedule:
    # Läuft täglich um 8:00 Uhr morgens (Berlin Zeit)
    - cron: '0 6 * * *'
  
  # Auch manuell startbar (zum Testen)
  workflow_dispatch:

jobs:
  deals-aktualisieren:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Code herunterladen
        uses: actions/checkout@v4

      - name: 🐍 Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Pakete installieren
        run: pip install -r requirements.txt

      - name: 🤖 Deal-Bot starten
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python deal_bot.py

      - name: 💾 Änderungen speichern
        run: |
          git config --local user.email "dealbot@dealdar.de"
          git config --local user.name "DealDar Bot"
          git add dealdar.html
          git diff --staged --quiet || git commit -m "🔄 Deals aktualisiert – $(date +'%d.%m.%Y %H:%M')"
          git push
